schema_version: 1
id: EXP-GAN-1024-030-ada-v1
kind: formal
hypothesis: Paper-default StyleGAN2-ADA augmentation may delay discriminator overfitting
  on the small dataset while keeping the G48/D16 architecture and 005 learning rates
  unchanged.
spec:
  ada_augpipe: bgc
  ada_interval: 4
  ada_kimg: 500.0
  ada_p_initial: 0.0
  ada_target: 0.6
  amp: true
  augmentation_mode: ada
  batch_size: 1
  beta1: 0.5
  channels: 3
  checkpoint_interval: 100
  d_lr: 0.0001
  dataset_dir: dataset/v1_1024/train
  diffaugment: false
  diffaugment_policy: color,translation,cutout
  discriminator_features: 16
  early_stop_min_delta: 0.0
  early_stop_min_epochs: 0
  early_stop_patience_evals: 0
  ema_decay: 0.995
  epochs: 3000
  g_lr: 0.0005
  generator_features: 48
  grad_accum_steps: 16
  image_size: 1024
  latent_dim: 100
  max_steps: null
  min_target_anchor_fraction: 0.01
  processed_dir: dataset/v1_1024/train
  real_label: 0.9
  sample_interval: 50
  seed: 42
  skip_prepare: true
  target_crop_expansion: 2.9
  workers: 0
tracking:
  mode: offline
  project: gan-arrow
  group: gan-1024
  swanlab_id: null
  swanlab_url: null
  note: migrated run; predates tracking integration
run:
  status: planned
  started_at: null
  finished_at: null
  completed_epoch: 0
  completed_steps: 0
  device: null
  git_commit: null
  spec_sha256: null
  error: null
result:
  loss_d: null
  loss_g: null
  d_real: null
  d_fake: null
  inference_source: null
  judgment: null
